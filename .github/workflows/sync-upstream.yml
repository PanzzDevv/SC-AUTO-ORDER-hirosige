name: Sync Upstream (Auto Update)

on:
  schedule:
    - cron: '0 0 * * *' # Berjalan otomatis setiap hari sekali pada jam 00:00 UTC
  workflow_dispatch: # Mengizinkan buyer men-trigger sinkronisasi manual dari tab Actions di GitHub

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    name: Sync latest commits from upstream repo
    steps:
      # Step 1: Checkout repositori milik buyer
      - name: Checkout target branch
        uses: actions/checkout@v3
        with:
          ref: main
          persist-credentials: true

      # Step 2: Lakukan sinkronisasi dari repositori asli PanzzDevv
      - name: Sync upstream changes
        uses: aormsby/fork-sync-action@v3.4
        with:
          target_sync_branch: main
          # Ganti ini jika nama repositori upstream Anda berbeda
          upstream_sync_repo: PanzzDevv/SC-AUTOORDER-TIKTOK
          upstream_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}

          # Menolak jika ada merge conflict (aman agar kode buyer tidak rusak jika mereka memodifikasinya)
          test_mode: false

      - name: Sync check
        if: failure()
        run: |
          echo "[WARNING] Terjadi conflict atau masalah saat melakukan sync otomatis."
          echo "Hal ini biasanya terjadi jika Anda (buyer) memodifikasi kode langsung di GitHub."
          exit 1
